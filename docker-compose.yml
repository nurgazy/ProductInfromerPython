version: '3.8'

services:
  migration_runner:
    build: .
    container_name: migration_runner
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/${POSTGRES_DB}
    command: alembic upgrade head
    depends_on:
      postgres_db:
        condition: service_healthy

  fastapi_app:
    build: .
    image: product_informer_img:latest
    container_name: product_informer
    ports:
      - "80:8000"
    volumes:
      - ./uploads:/app/temp_files
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/${POSTGRES_DB}
    restart: always
    depends_on:
      postgres_db:
        condition: service_healthy
      migration_runner:
        condition: service_completed_successfully

  postgres_db:
      image: postgres:15-alpine
      container_name: postgres_db
      environment:
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
        interval: 3s
        timeout: 3s
        retries: 5
      restart: always

volumes:
  postgres_data: